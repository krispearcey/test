<article class="card reveal-card card--dark">
<a
  class="card__inner"
  href="#"
  data-about-overlay
  data-overlay-bg="#446944"
  data-overlay-text="#f2f2f2"
  data-overlay-title="CHESS,<br>By Me"
  data-overlay-link-icon="true"
  data-overlay-body=
      "A love for chess sparked a series of project ideas that eventually led me to build a chess bot modeled after my own playstyle.<br> 
  <br>The bot is trained on my personal game history, learning not only the moves I tend to make but also the patterns and mistakes that define how I play. 
      Rated around my own ELO, it aims to feel less like a perfect engine and more like playing against me.<br>
  <br>I’m currently expanding the project by experimenting with conversational features, giving the bot a personality that reflects my own approach to the game. 
      It’s an evolving project that grows alongside my chess journey as I continue feeding it new games to analyze and learn from."
  data-overlay-meta="Chess | Automation"
  data-overlay-polaroid="assets/images/chessbot.png"
>
  <span class="card__label">Chess<br/>Bot</span>
  <img class="card__img" src="assets/images/chessbot.png" alt="Chess Bot" />
</a>
</article>

<article class="card reveal-card card--light">
<a
  class="card__inner"
  href="#"
  data-about-overlay
  data-overlay-bg="#d79db1"
  data-overlay-text="#14171a"
  data-overlay-title="NARROWS<br>COMP."
  data-overlay-link-icon="true"
  data-overlay-body="An optical compressor inspired by the Diamond Compressor; a pedal that’s been an almost always-on part of my guitar playing for years.<br>
      As my setup shifted from physical tube amps toward amp simulations for headphone practice and recording, I became increasingly interested in how digital tools recreate the feel of analog gear, 
      which ultimately led me to try building one myself.
  <br>Originally designed as a physical hardware concept, the project evolved into a VST plugin, becoming my introduction to audio software development, as well as C++. 
      Recreating the pedal digitally meant translating listening intuition into logic, experimenting with envelope detection, response curves, and timing behaviour to capture the interaction between player and instrument.<br>
  <br>Building it taught me the fundamentals of C++, digital signal processing concepts, and working with the Steinberg VST SDK."
  data-overlay-meta="VST Plugin | Audio DSP | C++"
  data-overlay-polaroid="assets/images/narrows.png"
>
  <span class="card__label">Narrows<br/>Compressor</span>
  <img class="card__img" src="assets/images/narrows.png" alt="Narrows Compression" />
</a>
</article>

<article class="card reveal-card card--light">
<a
  class="card__inner"
  href="#"
  data-about-overlay
  data-overlay-bg="#89c4d3"
  data-overlay-text="#14171a"
  data-overlay-title="COASTAL<br>AUDIO"
  data-overlay-link-icon="true"
  data-overlay-body="Coastal Audio began as a friend’s pedal company whose products I’d used and provided feedback on throughout their early development.<br>
  <br>After being brought in to help with web design and development, I built the site’s foundational framework and worked closely with them to shape it into their vision. 
      The project included ecommerce functionality, graphic design, and a blog platform. Once complete, I transitioned ownership back to the team, teaching them the basics of maintaining and updating the site.<br>
  <br>While the company has since rebranded, it continues to grow, and I still occasionally assist with specific requests and improvements."
  data-overlay-meta="Web Design | E-commerce | Branding"
  data-overlay-polaroid="assets/images/coastal.png"
>
  <span class="card__label">Coastal<br/>Audio</span>
  <img class="card__img" src="assets/images/coastal.png" alt="Coastal Audio" />
</a>
</article>

<article class="card reveal-card card--light">
<a
  class="card__inner"
  href="#"
  data-about-overlay
  data-overlay-bg="#849f7b"
  data-overlay-text="#14171a"
  data-overlay-title="Guest<br>Portal"
  data-overlay-link-icon="true"
  data-overlay-body="A custom wedding website designed and built for my own wedding.<br>
  <br>The site handled guest RSVPs, meal selections, song requests, and event information through a streamlined, easy-to-use interface.<br>
      It served as a central hub leading up to the event, simplifying communication and reducing the need for traditional paper coordination.<br>
  <br>After the event, the interactive features were retired and the site was archived, leaving a simplified thank-you page as a lasting snapshot of the project.
      The project became a practical example of building something with a clear lifecycle; designed to be useful for a moment in time, then intentionally simplified once its purpose was complete."
  data-overlay-meta="Web Design | UX | Personal Project"
  data-overlay-polaroid="assets/images/mk.png"
>
  <span class="card__label">M+K</span>
  <img class="card__img" src="assets/images/mk.png" alt="M+K" />
</a>
</article>

<article class="card reveal-card card--dark">
<a
  class="card__inner"
  href="#"
  data-about-overlay
  data-overlay-bg="#aa3634"
  data-overlay-text="#f2f2f2"
  data-overlay-title="TRACKMANIA<br>.io"
  data-overlay-link-icon="true"
  data-overlay-body="I’ve created a wide range of custom content for Trackmania, one of my all-time favorite games.<br>
  <br>My work includes designing and building original maps, using Blender to model custom scenery, structures, and environmental assets that enhance gameplay and visual immersion.
      Many of these projects were shared with the community and refined through player feedback and iteration.<br>
  <br>Beyond map design, I’ve also developed script-based plug-ins to improve and streamline the map editing process. 
      These tools extend the default editor’s functionality, making it more efficient and flexible for creators while solving small workflow problems I encountered during my own building process."
  data-overlay-meta="Level Design | Blender 3D | Scripting"
  data-overlay-polaroid="assets/images/trackmania.png"
>
  <span class="card__label">Trackmania<br/>.io</span>
  <img class="card__img" src="assets/images/trackmania.png" alt="Trackmania.io" />
</a>
</article>
        
<article class="card reveal-card card--dark">
<a
  class="card__inner"
  href="#"
  data-about-overlay
  data-overlay-bg="#0c0b0c"
  data-overlay-text="#f2f2f2"
  data-overlay-title="NOVEMBER<br>SERVERS"
  data-overlay-link-icon="true"
  data-overlay-body="November Servers began in 2013 when I co-founded a large Battlefield clan that quickly outgrew public matchmaking.<br>
  <br>To support private matches, practices, and community events, I created and managed dedicated game servers, which later expanded to hosting additional games including DayZ. 
      As requirements grew more complex, I developed custom plugins and gameplay systems to automate events, manage player interactions, and control server variables, 
      introducing me to C# and Enforce Script within Bohemia Interactive’s Enfusion engine.<br>
  <br>Working in this event-driven environment allowed me to extend and customize server behavior while managing live multiplayer infrastructure. 
      What began as a community necessity gradually turned into my introduction to programming and system design."
  data-overlay-meta="Server Dev | C# | Enfusion Engine"
  data-overlay-polaroid="assets/images/november.png"
>
  <span class="card__label">November<br/>Servers</span>
  <img class="card__img" src="assets/images/november.png" alt="November Servers" />
</a>
</article>
